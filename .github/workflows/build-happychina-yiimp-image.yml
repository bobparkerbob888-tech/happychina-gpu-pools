name: Build HappyChina YIIMP Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-happychina-yiimp-image.yml"
      - "happychina-yiimp/**"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: happychina-yiimp-app
            context: ./happychina-yiimp
            dockerfile: ./happychina-yiimp/docker/yiimp/Dockerfile
          - image_name: happychina-yiimp-daemons
            context: ./happychina-yiimp
            dockerfile: ./happychina-yiimp/docker/daemons/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=2.1.9
      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_args+=("-t" "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          docker build \
            "${tag_args[@]}" \
            -f "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"
      - name: Push image
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
