services:
  app_proxy:
    environment:
      APP_HOST: yiimp
      APP_PORT: 80
    container_name: happychina-gpu-pools-yiimp_app_proxy_1

  yiimp:
    build:
      context: ./docker/app
    container_name: happychina-gpu-pools-yiimp_1
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      HOST_WEB_ROOT: /mnt/yiimp-web
      APP_BACKUP_ROOT: /app-data/backups
    volumes:
      - /data/crypto-data/yiimp/site/web:/mnt/yiimp-web
      - ${APP_DATA_DIR}/data:/app-data
    restart: on-failure
