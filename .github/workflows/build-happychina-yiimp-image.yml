name: Build HappyChina YIIMP Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-happychina-yiimp-image.yml"
      - "happychina-yiimp/**"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: happychina-yiimp-app
            context: ./happychina-yiimp
            dockerfile: ./happychina-yiimp/docker/yiimp/Dockerfile
            platforms: linux/amd64
          - image_name: happychina-yiimp-daemons
            context: ./happychina-yiimp
            dockerfile: ./happychina-yiimp/docker/daemons/Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=2.1.3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
