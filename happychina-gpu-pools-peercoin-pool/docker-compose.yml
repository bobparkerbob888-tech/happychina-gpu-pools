version: '3.7'
services:
  app_proxy:
    environment:
      APP_HOST: happychina-gpu-pools-peercoin-pool_proxy_1
      APP_PORT: 80
      PROXY_AUTH_WHITELIST: /api/*
    container_name: happychina-gpu-pools-peercoin-pool_app_proxy_1

  web:
    image: >-
      ghcr.io/duckaxe/public-pool-ui:3c1289c@sha256:d916a72b2487c935468b894a89450e5ed688525500fcb81961061c3d7a7877e2
    container_name: happychina-gpu-pools-peercoin-pool_web_1
    restart: on-failure
    stop_grace_period: 30s
    environment:
      - DOMAIN=$DEVICE_DOMAIN_NAME

  server:
    image: >-
      ghcr.io/sethforprivacy/public-pool:9938a05@sha256:96347cbbc2ec6f27ec1b282e8353e41197fad6ca56e011873e69e7c3b6555b14
    container_name: happychina-gpu-pools-peercoin-pool_server_1
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - 2028:2018/tcp
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ${APP_DATA_DIR:-.}/data/database:/public-pool/DB
    environment:
      - NODE_ENV=production
      - BITCOIN_RPC_URL=http://host.docker.internal
      - BITCOIN_RPC_USER=umbrel
      - BITCOIN_RPC_PASSWORD=umbrel
      - BITCOIN_RPC_PORT=9902
      - BITCOIN_RPC_TIMEOUT=10000
      - API_PORT=2019
      - STRATUM_PORT=2018
      - NETWORK=mainnet
      - API_SECURE=false
      - ENABLE_SOLO=true
      - ENABLE_PROXY=false
      - POOL_IDENTIFIER=HappyChina PPC

  proxy:
    image: >-
      nginx:1.25.3@sha256:4c0fdaa8b6341bfdeca5f18f7837462c80cff90527ee35ef185571e1c327beac
    container_name: happychina-gpu-pools-peercoin-pool_proxy_1
    depends_on:
      - web
      - server
    restart: on-failure
    command:
      - /bin/sh
      - -c
      - |
        cat >/etc/nginx/conf.d/default.conf <<'EOF'
        server {
            listen 80;

            location / {
                proxy_pass http://happychina-gpu-pools-peercoin-pool_web_1:80;
            }

            location ~* ^/api/ {
                proxy_pass http://happychina-gpu-pools-peercoin-pool_server_1:2019;
            }
        }
        EOF
        exec nginx -g 'daemon off;'

  widget-server:
    image: >-
      ghcr.io/getumbrel/umbrel-public-pool-widget:v1.0.0@sha256:b8861a5b79471377f1bfbf6733f11350970b482103d4ef4185f372350ffff6b3
    container_name: happychina-gpu-pools-peercoin-pool_widget-server_1
    user: '1000:1000'
    environment:
      - PUBLIC_POOL_API_URL=http://happychina-gpu-pools-peercoin-pool_proxy_1/api/pool
    restart: on-failure
